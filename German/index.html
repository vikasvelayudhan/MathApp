<!DOCTYPE html>
<html lang="de">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no" />
  <meta name="apple-mobile-web-app-capable" content="yes" />
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent" />
  <meta name="apple-mobile-web-app-title" content="Mathe Quest" />
  <meta name="theme-color" content="#e8d5f5" />
  <link rel="manifest" href="manifest.json" />
  <link rel="apple-touch-icon" href="icons/icon-192.png" />
  <title>Mathe Quest</title>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    :root {
      --bright-bg: linear-gradient(180deg, #e8d5f5 0%, #d0e8f7 50%, #d4f5e0 100%);
      --bright-card: #ffffff;
      --bright-accent: #8b5cf6;
      --bright-accent2: #6db88f;
      --bright-text: #1a1a2e;
      --bright-correct: #22c55e;
      --bright-wrong: #ef4444;
      --bright-numpad: #ffffff;
      --bright-numpad-border: #d8cef0;
      --bright-shadow: 0 2px 12px rgba(0,0,0,0.08);

      --space-bg: linear-gradient(180deg, #1a0533 0%, #0f172a 100%);
      --space-card: rgba(255,255,255,0.1);
      --space-accent: #a855f7;
      --space-accent2: #38bdf8;
      --space-text: #f8fafc;
      --space-correct: #34d399;
      --space-wrong: #fb7185;
      --space-numpad: rgba(255,255,255,0.12);
      --space-numpad-border: rgba(255,255,255,0.18);
      --space-shadow: 0 2px 12px rgba(0,0,0,0.3);

      --jungle-bg: linear-gradient(180deg, #052e16 0%, #0a1f0a 100%);
      --jungle-card: rgba(255,255,255,0.1);
      --jungle-accent: #4ade80;
      --jungle-accent2: #fbbf24;
      --jungle-text: #f0fdf4;
      --jungle-correct: #86efac;
      --jungle-wrong: #fca5a5;
      --jungle-numpad: rgba(255,255,255,0.12);
      --jungle-numpad-border: rgba(255,255,255,0.18);
      --jungle-shadow: 0 2px 12px rgba(0,0,0,0.3);

      --bg: var(--bright-bg); --card: var(--bright-card); --accent: var(--bright-accent);
      --accent2: var(--bright-accent2); --text: var(--bright-text); --correct: var(--bright-correct);
      --wrong: var(--bright-wrong); --numpad-bg: var(--bright-numpad);
      --numpad-border: var(--bright-numpad-border); --shadow: var(--bright-shadow);
    }
    body.space {
      --bg: var(--space-bg); --card: var(--space-card); --accent: var(--space-accent);
      --accent2: var(--space-accent2); --text: var(--space-text); --correct: var(--space-correct);
      --wrong: var(--space-wrong); --numpad-bg: var(--space-numpad);
      --numpad-border: var(--space-numpad-border); --shadow: var(--space-shadow);
    }
    body.jungle {
      --bg: var(--jungle-bg); --card: var(--jungle-card); --accent: var(--jungle-accent);
      --accent2: var(--jungle-accent2); --text: var(--jungle-text); --correct: var(--jungle-correct);
      --wrong: var(--jungle-wrong); --numpad-bg: var(--jungle-numpad);
      --numpad-border: var(--jungle-numpad-border); --shadow: var(--jungle-shadow);
    }
    body {
      background: var(--bg); color: var(--text);
      font-family: 'Segoe UI', system-ui, -apple-system, sans-serif;
      min-height: 100dvh; display: flex; flex-direction: column; align-items: center; justify-content: flex-start;
      overflow-x: hidden; transition: background 0.5s ease, color 0.5s ease;
    }
    #bg-canvas { position: fixed; inset: 0; z-index: 0; pointer-events: none; }
    .screen { display: none; flex-direction: column; align-items: center; justify-content: center; min-height: 100dvh; width: 100%; max-width: 480px; padding: 24px 16px; position: relative; z-index: 1; }
    .screen.active { display: flex; }
    .card { background: var(--card); backdrop-filter: blur(16px); -webkit-backdrop-filter: blur(16px); border: 1px solid rgba(0,0,0,0.06); border-radius: 24px; padding: 28px 24px; width: 100%; box-shadow: var(--shadow); }
    body.space .card, body.jungle .card { border: 1px solid rgba(255,255,255,0.12); }
    .btn { display: inline-flex; align-items: center; justify-content: center; gap: 8px; padding: 14px 28px; border-radius: 50px; border: none; font-size: 1.05rem; font-weight: 700; cursor: pointer; transition: transform 0.15s, box-shadow 0.15s; -webkit-tap-highlight-color: transparent; width: 100%; margin: 6px 0; }
    .btn:active { transform: scale(0.96); }
    .btn-primary { background: linear-gradient(135deg, var(--accent), var(--accent2)); color: #fff; box-shadow: 0 4px 16px rgba(139,92,246,0.3); }
    .btn-secondary { background: rgba(0,0,0,0.05); color: var(--text); border: 1px solid rgba(0,0,0,0.1); }
    body.space .btn-secondary, body.jungle .btn-secondary { background: rgba(255,255,255,0.1); border-color: rgba(255,255,255,0.18); }
    .btn-hint { background: rgba(245,158,11,0.12); color: #b45309; border: 1px solid rgba(245,158,11,0.3); font-size: 0.95rem; }
    body.space .btn-hint, body.jungle .btn-hint { color: #fbbf24; }
    #screen-welcome .mascot { font-size: 5rem; margin-bottom: 8px; }
    #screen-welcome h1 { font-size: 2.2rem; font-weight: 900; text-align: center; margin-bottom: 6px; }
    #screen-welcome p { text-align: center; opacity: 0.7; margin-bottom: 24px; font-size: 1rem; }
    .theme-row { display: flex; gap: 10px; width: 100%; margin-bottom: 16px; }
    .theme-btn { flex: 1; padding: 14px 6px; border-radius: 16px; border: 2px solid transparent; background: rgba(0,0,0,0.04); cursor: pointer; text-align: center; transition: border-color 0.2s, transform 0.15s; -webkit-tap-highlight-color: transparent; }
    body.space .theme-btn, body.jungle .theme-btn { background: rgba(255,255,255,0.07); }
    .theme-btn:active { transform: scale(0.96); }
    .theme-btn.selected { border-color: var(--accent); }
    .theme-btn .theme-icon { font-size: 1.8rem; display: block; margin-bottom: 2px; }
    .theme-btn .theme-label { font-size: 0.8rem; font-weight: 700; }
    .name-row { display: flex; gap: 10px; align-items: center; margin-bottom: 16px; }
    .name-input { flex: 1; padding: 14px 18px; border-radius: 50px; background: rgba(0,0,0,0.04); border: 1px solid rgba(0,0,0,0.12); color: var(--text); font-size: 1rem; font-weight: 600; outline: none; }
    body.space .name-input, body.jungle .name-input { background: rgba(255,255,255,0.1); border-color: rgba(255,255,255,0.2); }
    .name-input::placeholder { opacity: 0.5; }
    .ops-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 10px; margin-bottom: 16px; }
    .op-btn { padding: 16px 8px; border-radius: 16px; border: 2px solid rgba(0,0,0,0.08); background: rgba(0,0,0,0.03); cursor: pointer; text-align: center; transition: border-color 0.2s, background 0.2s, transform 0.15s; }
    body.space .op-btn, body.jungle .op-btn { border-color: rgba(255,255,255,0.12); background: rgba(255,255,255,0.06); }
    .op-btn:active { transform: scale(0.95); }
    .op-btn.selected { border-color: var(--accent); background: rgba(139,92,246,0.08); }
    .op-btn .op-sym { font-size: 1.8rem; display: block; font-weight: 900; color: var(--accent); }
    .op-btn .op-name { font-size: 0.8rem; font-weight: 700; opacity: 0.7; }
    #screen-game { justify-content: flex-start; padding-top: max(env(safe-area-inset-top), 16px); }
    .top-bar { display: flex; align-items: center; justify-content: space-between; width: 100%; margin-bottom: 12px; }
    .level-badge { background: linear-gradient(135deg, var(--accent), var(--accent2)); color: #fff; font-size: 0.8rem; font-weight: 800; padding: 5px 14px; border-radius: 50px; }
    .score-box { font-size: 0.9rem; font-weight: 700; opacity: 0.8; }
    .streak-box { font-size: 1.1rem; }
    .mascot-bubble { display: flex; align-items: flex-start; gap: 10px; width: 100%; margin-bottom: 12px; }
    .mascot-avatar { font-size: 2.2rem; flex-shrink: 0; margin-top: 4px; }
    .mascot-msg { background: var(--card); border-radius: 16px 16px 16px 4px; padding: 10px 14px; font-size: 0.9rem; font-weight: 600; line-height: 1.4; box-shadow: var(--shadow); border: 1px solid rgba(0,0,0,0.06); max-width: 100%; animation: fadeSlide 0.3s ease; }
    body.space .mascot-msg, body.jungle .mascot-msg { border-color: rgba(255,255,255,0.12); }
    @keyframes fadeSlide { from { opacity: 0; transform: translateY(-6px); } to { opacity: 1; transform: translateY(0); } }
    .question-card { width: 100%; border-radius: 24px; padding: 32px 20px 28px; text-align: center; margin-bottom: 16px; background: var(--card); box-shadow: var(--shadow); border: 1px solid rgba(0,0,0,0.06); }
    body.space .question-card, body.jungle .question-card { border-color: rgba(255,255,255,0.12); }
    .operation-label { font-size: 0.75rem; font-weight: 700; letter-spacing: 0.1em; opacity: 0.5; margin-bottom: 6px; text-transform: uppercase; }
    .question-text { font-size: 2.8rem; font-weight: 900; letter-spacing: -1px; }
    .answer-area { width: 100%; }
    .answer-input-row { display: flex; gap: 10px; align-items: center; margin-bottom: 10px; }
    .answer-input { flex: 1; padding: 16px 20px; border-radius: 16px; font-size: 1.8rem; font-weight: 900; text-align: center; background: rgba(139,92,246,0.06); border: 2px solid rgba(139,92,246,0.2); color: var(--text); outline: none; transition: border-color 0.2s; }
    .answer-input.correct { border-color: var(--correct); background: rgba(34,197,94,0.1); }
    .answer-input.wrong { border-color: var(--wrong); background: rgba(239,68,68,0.08); }
    .star-track { text-align: center; margin-bottom: 10px; font-size: 1.4rem; letter-spacing: 4px; }
    .numpad { display: grid; grid-template-columns: repeat(3, 1fr); gap: 8px; margin-bottom: 10px; }
    .np-btn { padding: 16px; border-radius: 14px; font-size: 1.4rem; font-weight: 800; background: var(--numpad-bg); border: 1.5px solid var(--numpad-border); color: var(--text); cursor: pointer; text-align: center; transition: background 0.12s, transform 0.1s; -webkit-tap-highlight-color: transparent; user-select: none; }
    .np-btn:active { transform: scale(0.92); opacity: 0.8; }
    .np-btn.np-zero { grid-column: span 2; }
    .np-btn.np-del { background: rgba(239,68,68,0.08); border-color: rgba(239,68,68,0.25); color: #dc2626; }
    body.space .np-btn.np-del, body.jungle .np-btn.np-del { color: #f87171; }
    .np-btn.np-neg { background: rgba(245,158,11,0.08); border-color: rgba(245,158,11,0.25); color: #b45309; font-size: 1rem; }
    .submit-row { display: flex; gap: 10px; }
    .submit-row .btn { flex: 1; }
    .feedback-banner { width: 100%; border-radius: 16px; padding: 14px 18px; font-size: 0.9rem; font-weight: 700; text-align: center; margin-bottom: 10px; display: none; line-height: 1.5; }
    .feedback-banner.correct-fb { background: rgba(34,197,94,0.12); border: 1px solid rgba(34,197,94,0.3); color: #166534; }
    .feedback-banner.wrong-fb { background: rgba(239,68,68,0.1); border: 1px solid rgba(239,68,68,0.25); color: #991b1b; }
    body.space .feedback-banner.correct-fb, body.jungle .feedback-banner.correct-fb { color: #6ee7b7; }
    body.space .feedback-banner.wrong-fb, body.jungle .feedback-banner.wrong-fb { color: #fecdd3; }
    .modal-overlay { display: none; position: fixed; inset: 0; z-index: 100; background: rgba(0,0,0,0.5); backdrop-filter: blur(6px); align-items: flex-end; justify-content: center; padding: 16px; }
    .modal-overlay.open { display: flex; }
    .modal-box { background: #fff; border-radius: 28px 28px 20px 20px; padding: 28px 24px 32px; width: 100%; max-width: 480px; max-height: 80dvh; overflow-y: auto; border: 1px solid rgba(0,0,0,0.08); animation: slideUp 0.35s cubic-bezier(0.34,1.56,0.64,1); color: #1a1a2e; }
    body.space .modal-box { background: #1e1b4b; color: #f8fafc; border-color: rgba(255,255,255,0.15); }
    body.jungle .modal-box { background: #052e16; color: #f0fdf4; border-color: rgba(255,255,255,0.15); }
    @keyframes slideUp { from { transform: translateY(60px); opacity: 0; } to { transform: translateY(0); opacity: 1; } }
    .modal-title { font-size: 1.3rem; font-weight: 900; margin-bottom: 16px; }
    .teach-step { background: rgba(0,0,0,0.04); border-radius: 14px; padding: 12px 14px; margin-bottom: 8px; font-size: 0.95rem; line-height: 1.6; }
    body.space .teach-step, body.jungle .teach-step { background: rgba(255,255,255,0.07); }
    .teach-step .step-num { display: inline-block; background: var(--accent); color: #fff; font-weight: 900; font-size: 0.7rem; border-radius: 50%; width: 20px; height: 20px; text-align: center; line-height: 20px; margin-right: 8px; }
    .progress-track { width: 100%; height: 7px; border-radius: 50px; background: rgba(0,0,0,0.08); overflow: hidden; margin-bottom: 12px; }
    body.space .progress-track, body.jungle .progress-track { background: rgba(255,255,255,0.1); }
    .progress-fill { height: 100%; border-radius: 50px; background: linear-gradient(90deg, var(--accent), var(--accent2)); transition: width 0.5s cubic-bezier(0.34,1.56,0.64,1); }
    #confetti-canvas { position: fixed; inset: 0; z-index: 200; pointer-events: none; }
    .big-feedback { position: fixed; inset: 0; z-index: 201; display: none; align-items: center; justify-content: center; flex-direction: column; background: rgba(0,0,0,0.4); backdrop-filter: blur(4px); }
    .big-feedback.show { display: flex; animation: popIn 0.4s cubic-bezier(0.34,1.56,0.64,1); }
    @keyframes popIn { from { transform: scale(0.5); opacity: 0; } to { transform: scale(1); opacity: 1; } }
    .big-feedback .emoji { font-size: 5rem; margin-bottom: 8px; }
    .big-feedback .message { font-size: 1.6rem; font-weight: 900; text-align: center; color: #fff; text-shadow: 0 2px 16px rgba(0,0,0,0.5); }
    .big-feedback .sub { font-size: 1rem; opacity: 0.8; margin-top: 4px; color: #fff; }
    #screen-summary .trophy { font-size: 5rem; text-align: center; margin-bottom: 12px; }
    #screen-summary h2 { font-size: 1.8rem; font-weight: 900; text-align: center; margin-bottom: 8px; }
    #screen-summary .stat-row { display: flex; justify-content: space-around; margin: 20px 0; }
    .stat-box { text-align: center; }
    .stat-box .val { font-size: 2.2rem; font-weight: 900; color: var(--accent); }
    .stat-box .lbl { font-size: 0.8rem; opacity: 0.6; margin-top: 2px; }
    .bounce { animation: bounce 0.5s cubic-bezier(0.34,1.56,0.64,1); }
    @keyframes bounce { from { transform: scale(0.85); } to { transform: scale(1); } }
    .shake { animation: shake 0.4s ease; }
    @keyframes shake { 0%,100%{transform:translateX(0)} 20%{transform:translateX(-8px)} 40%{transform:translateX(8px)} 60%{transform:translateX(-5px)} 80%{transform:translateX(5px)} }
    @media (max-height: 700px) { .question-text { font-size: 2.2rem; } .np-btn { padding: 12px; font-size: 1.2rem; } }
    h2.section-title { font-size: 0.9rem; font-weight: 700; opacity: 0.5; margin-bottom: 10px; letter-spacing: 0.05em; text-transform: uppercase; }
    .mt8 { margin-top: 8px; } .mt16 { margin-top: 16px; }
  </style>
</head>
<body class="bright">

<canvas id="bg-canvas"></canvas>
<canvas id="confetti-canvas"></canvas>

<div class="big-feedback" id="big-feedback">
  <div class="emoji" id="big-emoji">🎉</div>
  <div class="message" id="big-message">Genial!</div>
  <div class="sub" id="big-sub"></div>
</div>

<div class="modal-overlay" id="teach-modal">
  <div class="modal-box">
    <div class="modal-title" id="teach-title">Ich zeig dir wie! 🧑‍🏫</div>
    <div id="teach-content"></div>
    <button class="btn btn-primary mt16" onclick="closeTeach()">Verstanden! Nochmal versuchen 💪</button>
  </div>
</div>

<!-- ═══ Willkommen ═══ -->
<div class="screen active" id="screen-welcome">
  <div class="mascot" id="welcome-mascot">🦉</div>
  <h1>Mathe Quest</h1>
  <p>Der lustige Weg zum Mathe-Superstar!</p>

  <div class="card">
    <h2 class="section-title">Dein Name</h2>
    <div class="name-row" style="margin-bottom:20px">
      <input class="name-input" id="name-input" type="text" maxlength="16" placeholder="Gib deinen Namen ein…" autocomplete="off" />
    </div>

    <h2 class="section-title">Wähle deine Welt</h2>
    <div class="theme-row" style="margin-bottom:20px">
      <button class="theme-btn selected" id="theme-bright" onclick="selectTheme('bright')">
        <span class="theme-icon">☀️</span>
        <span class="theme-label">Hell</span>
      </button>
      <button class="theme-btn" id="theme-space" onclick="selectTheme('space')">
        <span class="theme-icon">🚀</span>
        <span class="theme-label">Weltraum</span>
      </button>
      <button class="theme-btn" id="theme-jungle" onclick="selectTheme('jungle')">
        <span class="theme-icon">🌴</span>
        <span class="theme-label">Dschungel</span>
      </button>
    </div>

    <h2 class="section-title">Wähle Rechenarten</h2>
    <div class="ops-grid" style="margin-bottom:20px">
      <button class="op-btn selected" id="op-add" onclick="toggleOp('add')"><span class="op-sym">＋</span><span class="op-name">Addition</span></button>
      <button class="op-btn selected" id="op-sub" onclick="toggleOp('sub')"><span class="op-sym">－</span><span class="op-name">Subtraktion</span></button>
      <button class="op-btn selected" id="op-mul" onclick="toggleOp('mul')"><span class="op-sym">✕</span><span class="op-name">Multiplikation</span></button>
      <button class="op-btn selected" id="op-div" onclick="toggleOp('div')"><span class="op-sym">÷</span><span class="op-name">Division</span></button>
    </div>

    <button class="btn btn-primary" onclick="startGame()">🚀 Los geht's!</button>
  </div>
</div>

<!-- ═══ Spiel ═══ -->
<div class="screen" id="screen-game">
  <div class="top-bar">
    <span class="level-badge" id="level-badge">Stufe 1</span>
    <span class="streak-box" id="streak-box"></span>
    <span class="score-box" id="score-box">⭐ 0</span>
  </div>
  <div class="progress-track"><div class="progress-fill" id="progress-fill" style="width:0%"></div></div>

  <div class="mascot-bubble" id="mascot-bubble">
    <div class="mascot-avatar" id="game-mascot">🦉</div>
    <div class="mascot-msg" id="mascot-msg">Lass uns rechnen!</div>
  </div>

  <div class="question-card bounce" id="question-card">
    <div class="operation-label" id="op-label">Addition</div>
    <div class="question-text" id="question-text">5 + 3 = ?</div>
    <div class="answer-input-row" style="margin-top:16px;justify-content:center;">
      <div class="answer-input" id="answer-display" style="max-width:200px;">_</div>
    </div>
  </div>

  <div class="star-track" id="star-track">☆☆☆☆☆</div>

  <div class="feedback-banner" id="feedback-banner"></div>

  <div class="answer-area">
    <div class="numpad" id="numpad">
      <button class="np-btn" onclick="numpadPress('1')">1</button>
      <button class="np-btn" onclick="numpadPress('2')">2</button>
      <button class="np-btn" onclick="numpadPress('3')">3</button>
      <button class="np-btn" onclick="numpadPress('4')">4</button>
      <button class="np-btn" onclick="numpadPress('5')">5</button>
      <button class="np-btn" onclick="numpadPress('6')">6</button>
      <button class="np-btn" onclick="numpadPress('7')">7</button>
      <button class="np-btn" onclick="numpadPress('8')">8</button>
      <button class="np-btn" onclick="numpadPress('9')">9</button>
      <button class="np-btn np-neg" onclick="numpadPress('-')">±</button>
      <button class="np-btn np-zero" onclick="numpadPress('0')">0</button>
      <button class="np-btn np-del" onclick="numpadDel()">⌫</button>
    </div>
    <div class="submit-row">
      <button class="btn btn-primary" id="submit-btn" onclick="submitAnswer()">✓ Prüfen!</button>
      <button class="btn btn-secondary" id="next-btn" onclick="nextQuestion()" style="display:none">Weiter ➜</button>
    </div>
    <button class="btn btn-hint mt8" onclick="showTeach()">🤔 Ich weiß nicht, wie das geht</button>
  </div>
</div>

<!-- ═══ Zusammenfassung ═══ -->
<div class="screen" id="screen-summary">
  <div class="trophy" id="summary-trophy">🏆</div>
  <h2 id="summary-title">Super gemacht!</h2>
  <div class="card">
    <div class="stat-row">
      <div class="stat-box"><div class="val" id="stat-score">0</div><div class="lbl">Punkte</div></div>
      <div class="stat-box"><div class="val" id="stat-correct">0</div><div class="lbl">Richtig</div></div>
      <div class="stat-box"><div class="val" id="stat-streak">0</div><div class="lbl">Beste Serie</div></div>
    </div>
    <div id="summary-message" style="text-align:center;opacity:0.7;margin-bottom:16px;font-size:0.95rem;"></div>
    <button class="btn btn-primary" onclick="restartGame()">🔄 Nochmal spielen</button>
    <button class="btn btn-secondary mt8" onclick="showScreen('screen-welcome')">🏠 Einstellungen ändern</button>
  </div>
</div>

<script>
const STATE = {
  name: 'Entdecker', theme: 'bright',
  ops: { add: true, sub: true, mul: true, div: true },
  level: 1, score: 0, streak: 0, bestStreak: 0,
  totalCorrect: 0, totalAnswered: 0,
  questionsThisLevel: 0, correctThisLevel: 0,
  currentQ: null, inputVal: '', answered: false, attempts: 0,
};
const QUESTIONS_PER_LEVEL = 5;
const CORRECT_TO_ADVANCE = 4;

/* ─── Sound ──────────────────────────────────────── */
let audioCtx = null;
function getAudio() { if(!audioCtx) audioCtx=new(window.AudioContext||window.webkitAudioContext)(); if(audioCtx.state==='suspended')audioCtx.resume(); return audioCtx; }
function playTone(f,d,t,v){ const ctx=getAudio(),o=ctx.createOscillator(),g=ctx.createGain(); o.type=t||'sine';o.frequency.value=f;g.gain.setValueAtTime(v||0.3,ctx.currentTime);g.gain.exponentialRampToValueAtTime(0.001,ctx.currentTime+d);o.connect(g);g.connect(ctx.destination);o.start();o.stop(ctx.currentTime+d); }
function soundTap(){playTone(600,0.06,'sine',0.12);}
function soundCorrect(){[523,659,784,1047].forEach((f,i)=>setTimeout(()=>playTone(f,0.15,'sine',0.25),i*80));}
function soundWrong(){playTone(200,0.25,'triangle',0.2);setTimeout(()=>playTone(160,0.3,'triangle',0.2),150);}
function soundLevelUp(){[523,659,784,1047,1319].forEach((f,i)=>setTimeout(()=>playTone(f,0.2,'sine',0.3),i*100));}
function soundFireworks(){for(let i=0;i<8;i++)setTimeout(()=>playTone(800+Math.random()*1200,0.12,'sine',0.15),i*60);}
function soundStreak(){soundCorrect();setTimeout(soundFireworks,350);}

/* ─── Persistence ────────────────────────────────── */
function saveProgress(){ try{localStorage.setItem('mathquest_de_v2',JSON.stringify({name:STATE.name,theme:STATE.theme,level:STATE.level,score:STATE.score,bestStreak:STATE.bestStreak,totalCorrect:STATE.totalCorrect}));}catch(e){} }
function loadProgress(){ try{const r=localStorage.getItem('mathquest_de_v2');if(!r)return;const d=JSON.parse(r);if(d.name){STATE.name=d.name;document.getElementById('name-input').value=d.name;}if(d.theme){STATE.theme=d.theme;selectTheme(d.theme,true);}if(d.level)STATE.level=Math.min(d.level,10);if(d.score)STATE.score=d.score;if(d.bestStreak)STATE.bestStreak=d.bestStreak;if(d.totalCorrect)STATE.totalCorrect=d.totalCorrect;}catch(e){} }

/* ─── Theme ──────────────────────────────────────── */
const MASCOTS={bright:'🦉',space:'🚀',jungle:'🦁'};
function selectTheme(t,silent){STATE.theme=t;document.body.className=t;['bright','space','jungle'].forEach(x=>document.getElementById('theme-'+x).classList.toggle('selected',x===t));document.getElementById('welcome-mascot').textContent=MASCOTS[t];if(!silent)saveProgress();}

/* ─── Operations ─────────────────────────────────── */
function toggleOp(op){const a=Object.values(STATE.ops).filter(Boolean).length;if(STATE.ops[op]&&a===1)return;STATE.ops[op]=!STATE.ops[op];document.getElementById('op-'+op).classList.toggle('selected',STATE.ops[op]);}

/* ─── Mascot Messages ────────────────────────────── */
const greetings=[
  n=>`Hallo ${n}! Lass uns Mathe üben — du schaffst das! 🌟`,
  n=>`Bereit, ${n}? Lass uns diese Aufgabe zusammen lösen!`,
  n=>`Du kannst das, ${n}! Probier's aus! 💪`,
  n=>`Hier kommt eine neue Aufgabe für dich, ${n}!`,
  n=>`Los geht's, ${n}! Zeig mir was du kannst! ✨`,
];
const correctMascot=[
  n=>`Genial, ${n}! Das war richtig! 🎉`,
  n=>`Brillant, ${n}! ⭐`,
  n=>`${n} ist nicht zu stoppen! 🔥`,
  n=>`Perfekt, ${n}! Weiter so! 🚀`,
  n=>`Wow, ${n}! Du bist ein Superstar! 🌟`,
];
const wrongMascot=[
  n=>`Fast, ${n}! Versuch es nochmal — ich glaub an dich! 💪`,
  n=>`Nicht ganz, ${n}. Schau dir den Hinweis an!`,
  n=>`Weitermachen, ${n}! Du schaffst das! ✨`,
];
function randFrom(arr){return arr[Math.floor(Math.random()*arr.length)];}
function setMascotMsg(msg){const el=document.getElementById('mascot-msg');el.textContent=msg;el.style.animation='none';void el.offsetWidth;el.style.animation='';document.getElementById('game-mascot').textContent=MASCOTS[STATE.theme];}

/* ─── Question Generation ────────────────────────── */
function rand(min,max){return Math.floor(Math.random()*(max-min+1))+min;}
function generateQuestion(level){
  const ops=Object.keys(STATE.ops).filter(k=>STATE.ops[k]);const op=ops[rand(0,ops.length-1)];
  let a,b,answer,sym,opName;const easy=level<=2,mid=level<=5;
  if(op==='add'){opName='Addition';sym='+';const mx=easy?20:mid?100:999,mn=easy?1:mid?10:50;a=rand(mn,mx);b=rand(mn,mx);answer=a+b;}
  else if(op==='sub'){opName='Subtraktion';sym='−';const mx=easy?20:mid?100:500;a=rand(easy?5:10,mx);b=rand(0,a);if(level>=5)b=rand(0,mx);answer=a-b;}
  else if(op==='mul'){opName='Multiplikation';sym='×';const mxA=easy?5:mid?10:15,mxB=easy?5:mid?12:20;a=rand(2,mxA);b=rand(2,mxB);answer=a*b;}
  else{opName='Division';sym='÷';const mxQ=easy?5:mid?12:20;b=rand(2,mxQ);answer=rand(1,mxQ);a=b*answer;}
  return {a,b,sym,op,opName,answer,text:`${a} ${sym} ${b} = ?`};
}

/* ─── Game Flow ──────────────────────────────────── */
function startGame(){const n=document.getElementById('name-input').value.trim();STATE.name=n||'Entdecker';STATE.streak=0;STATE.questionsThisLevel=0;STATE.correctThisLevel=0;saveProgress();showScreen('screen-game');newQuestion();updateHUD();}
function newQuestion(){STATE.inputVal='';STATE.answered=false;STATE.attempts=0;STATE.currentQ=generateQuestion(STATE.level);document.getElementById('question-text').textContent=STATE.currentQ.text;document.getElementById('op-label').textContent=STATE.currentQ.opName;document.getElementById('answer-display').textContent='_';document.getElementById('answer-display').className='answer-input';document.getElementById('feedback-banner').style.display='none';document.getElementById('submit-btn').style.display='';document.getElementById('next-btn').style.display='none';setMascotMsg(randFrom(greetings)(STATE.name));updateStars();const qc=document.getElementById('question-card');qc.classList.remove('bounce');void qc.offsetWidth;qc.classList.add('bounce');updateProgress();}
function updateHUD(){document.getElementById('level-badge').textContent=`Stufe ${STATE.level}`;document.getElementById('score-box').textContent=`⭐ ${STATE.score}`;const s=STATE.streak;document.getElementById('streak-box').textContent=s>=3?`🔥${s}`:s>=1?`✨${s}`:'';}
function updateProgress(){document.getElementById('progress-fill').style.width=(STATE.questionsThisLevel/QUESTIONS_PER_LEVEL*100)+'%';}
function updateStars(){let stars='';for(let i=0;i<QUESTIONS_PER_LEVEL;i++)stars+=i<STATE.correctThisLevel?'★':'☆';document.getElementById('star-track').textContent=stars;}

/* ─── Numpad ─────────────────────────────────────── */
function numpadPress(ch){if(STATE.answered)return;soundTap();if(ch==='-'){if(STATE.inputVal.startsWith('-'))STATE.inputVal=STATE.inputVal.slice(1);else if(!STATE.inputVal.length)STATE.inputVal='-';else STATE.inputVal='-'+STATE.inputVal;}else{if(STATE.inputVal.replace('-','').length>=5)return;STATE.inputVal+=ch;}document.getElementById('answer-display').textContent=STATE.inputVal||'_';}
function numpadDel(){if(STATE.answered)return;soundTap();STATE.inputVal=STATE.inputVal.slice(0,-1);document.getElementById('answer-display').textContent=STATE.inputVal||'_';}

/* ─── Answer Checking ────────────────────────────── */
function submitAnswer(){if(STATE.answered||STATE.inputVal===''||STATE.inputVal==='-')return;const guess=parseInt(STATE.inputVal,10);if(guess===STATE.currentQ.answer){STATE.answered=true;STATE.totalAnswered++;STATE.questionsThisLevel++;handleCorrect();updateHUD();updateProgress();updateStars();document.getElementById('submit-btn').style.display='none';document.getElementById('next-btn').style.display='';}else{STATE.attempts++;handleWrong(guess);}}
function handleCorrect(){STATE.score+=STATE.level*10;STATE.streak++;STATE.bestStreak=Math.max(STATE.bestStreak,STATE.streak);STATE.totalCorrect++;STATE.correctThisLevel++;saveProgress();document.getElementById('answer-display').classList.add('correct');showBanner('correct-fb',randFrom(correctMascot)(STATE.name));setMascotMsg(randFrom(correctMascot)(STATE.name));soundCorrect();const ms=STATE.streak===3||STATE.streak===5||STATE.streak%10===0;if(ms){launchFireworks();showBigFeedback();soundStreak();}else{launchMiniConfetti();}if(STATE.questionsThisLevel>=QUESTIONS_PER_LEVEL){if(STATE.correctThisLevel>=CORRECT_TO_ADVANCE&&STATE.level<10){STATE.level++;STATE.questionsThisLevel=0;STATE.correctThisLevel=0;setTimeout(()=>{showLevelUp();soundLevelUp();},1200);}else{STATE.questionsThisLevel=0;STATE.correctThisLevel=0;}saveProgress();}}
function handleWrong(guess){STATE.streak=0;soundWrong();document.getElementById('answer-display').classList.add('wrong');const qc=document.getElementById('question-card');qc.classList.remove('shake');void qc.offsetWidth;qc.classList.add('shake');showBanner('wrong-fb',buildHint(STATE.currentQ,guess,STATE.attempts));setMascotMsg(randFrom(wrongMascot)(STATE.name));setTimeout(()=>{STATE.inputVal='';document.getElementById('answer-display').textContent='_';document.getElementById('answer-display').className='answer-input';},1500);}

/* ─── Hints ──────────────────────────────────────── */
function buildHint(q,guess,attempt){
  const diff=q.answer-guess;
  let h=diff>0?`📈 Zu klein, ${STATE.name}! Versuch eine größere Zahl. `:`📉 Zu groß, ${STATE.name}! Versuch eine kleinere Zahl. `;
  if(attempt===1){if(q.op==='add')h+=`Fang bei ${q.a} an und zähle ${q.b} Schritte vorwärts.`;else if(q.op==='sub')h+=`Fang bei ${q.a} an und zähle ${q.b} Schritte rückwärts.`;else if(q.op==='mul')h+=`Was ist ${q.a} mal hintereinander ${q.b} dazugezählt?`;else h+=`Wie oft passt ${q.b} in ${q.a}?`;}
  else if(attempt===2){if(Math.abs(diff)<=3){h+=`🔥 SO nah dran! Nur ein kleines bisschen daneben.`;}else if(q.op==='add')h+=`Teile es auf: ${q.a}+${Math.floor(q.b/2)}=${q.a+Math.floor(q.b/2)}, dann noch ${q.b-Math.floor(q.b/2)} dazu.`;else if(q.op==='sub')h+=`Versuch: ${q.a}−${Math.floor(q.b/2)}=${q.a-Math.floor(q.b/2)}, dann noch ${q.b-Math.floor(q.b/2)} abziehen.`;else if(q.op==='mul')h+=`Zähle in ${q.b}er-Schritten: ${Array.from({length:Math.min(q.a,5)},(_,i)=>q.b*(i+1)).join(', ')}… weiter!`;else h+=`${q.b} × ? = ${q.a}. Probier verschiedene Zahlen!`;}
  else{h+=`💡 Die Antwort liegt zwischen <strong>${q.answer-2}</strong> und <strong>${q.answer+2}</strong>. Du schaffst das, ${STATE.name}!`;}
  return h;
}

/* ─── Teach ──────────────────────────────────────── */
function showTeach(){const q=STATE.currentQ;if(!q)return;document.getElementById('teach-title').textContent=teachTitle(q.op);document.getElementById('teach-content').innerHTML=buildTeachContent(q);document.getElementById('teach-modal').classList.add('open');}
function closeTeach(){document.getElementById('teach-modal').classList.remove('open');STATE.inputVal='';STATE.answered=false;document.getElementById('answer-display').textContent='_';document.getElementById('answer-display').className='answer-input';document.getElementById('feedback-banner').style.display='none';document.getElementById('submit-btn').style.display='';document.getElementById('next-btn').style.display='none';setMascotMsg(`Jetzt probier es selbst, ${STATE.name}! Du schaffst das! 💪`);}
function teachTitle(op){return{add:'So geht Addieren ➕',sub:'So geht Subtrahieren ➖',mul:'So geht Multiplizieren ✖️',div:'So geht Dividieren ➗'}[op];}
function buildTeachContent(q){return({add:teachAdd,sub:teachSub,mul:teachMul,div:teachDiv})[q.op](q);}
function step(n,html){return `<div class="teach-step"><span class="step-num">${n}</span>${html}</div>`;}
function teachAdd(q){const dots=n=>'🔵'.repeat(Math.min(n,20))+(n>20?`…(${n})`:'');return[step(1,`Addieren heißt <strong>zusammenzählen</strong>.`),step(2,`Fang mit ${q.a} an: ${dots(q.a)}`),step(3,`Jetzt zähle ${q.b} dazu: ${dots(q.b)}`),step(4,`Zähle alle zusammen… du bekommst <strong>${q.answer}</strong>! 🎉`),step(5,`Also: <strong>${q.a} + ${q.b} = ${q.answer}</strong>`)].join('');}
function teachSub(q){return[step(1,`Subtrahieren heißt <strong>wegnehmen</strong>.`),step(2,`Du startest mit <strong>${q.a}</strong>.`),step(3,`Du nimmst <strong>${q.b}</strong> weg.`),step(4,`Zähle von ${q.a} rückwärts, ${q.b} Schritte…`),step(5,`Du landest bei <strong>${q.answer}</strong>! Also: <strong>${q.a} − ${q.b} = ${q.answer}</strong>`)].join('');}
function teachMul(q){const gr=Array.from({length:Math.min(q.a,10)},()=>'⭐'.repeat(Math.min(q.b,10))).join(' | ');return[step(1,`Multiplizieren heißt <strong>mehrmals zusammenzählen</strong>.`),step(2,`${q.a} × ${q.b} bedeutet: „${q.a} Gruppen mit je ${q.b}"`),step(3,`Hier sind die Gruppen: <br><span style="font-size:1rem">${gr}</span>`),step(4,`Zähle alle Sterne… das sind <strong>${q.answer}</strong>!`),step(5,`Also: <strong>${q.a} × ${q.b} = ${q.answer}</strong>`)].join('');}
function teachDiv(q){return[step(1,`Dividieren heißt <strong>gerecht aufteilen</strong>.`),step(2,`Du hast <strong>${q.a}</strong> Dinge.`),step(3,`Teile sie auf <strong>${q.b}</strong> Freunde auf.`),step(4,`Ziehe immer wieder ${q.b} von ${q.a} ab bis du bei 0 bist…`),step(5,`Jeder bekommt <strong>${q.answer}</strong>! Also: <strong>${q.a} ÷ ${q.b} = ${q.answer}</strong>`)].join('');}

/* ─── Feedback ───────────────────────────────────── */
function showBanner(cls,html){const b=document.getElementById('feedback-banner');b.className='feedback-banner '+cls;b.innerHTML=html;b.style.display='block';}
function showBigFeedback(){const el=document.getElementById('big-feedback');const emojis=['🎉','🌟','🏆','🥇','🚀','🦁','🎊','💫'];document.getElementById('big-emoji').textContent=emojis[Math.floor(Math.random()*emojis.length)];const s=STATE.streak;if(s>=10){document.getElementById('big-message').textContent=`${STATE.name} ist UNAUFHALTBAR! 🔥`;document.getElementById('big-sub').textContent=`${s} hintereinander!`;}else if(s>=5){document.getElementById('big-message').textContent=`${STATE.name} ist AUF FEUER! 🔥🔥`;document.getElementById('big-sub').textContent=`${s} richtig hintereinander!`;}else{document.getElementById('big-message').textContent=`MEGA, ${STATE.name}! ✨`;document.getElementById('big-sub').textContent=`${s} richtig hintereinander!`;}el.classList.add('show');setTimeout(()=>el.classList.remove('show'),2200);}
function showLevelUp(){const el=document.getElementById('big-feedback');document.getElementById('big-emoji').textContent='🆙';document.getElementById('big-message').textContent=`Stufe ${STATE.level}, ${STATE.name}!`;document.getElementById('big-sub').textContent='Du bist aufgestiegen! Schwerere Aufgaben warten!';el.classList.add('show');launchFireworks();soundFireworks();setTimeout(()=>el.classList.remove('show'),2400);}

/* ─── Confetti / Fireworks ───────────────────────── */
const cvs=document.getElementById('confetti-canvas'),ctx2=cvs.getContext('2d');let particles=[],animId=null;
function resizeConfetti(){cvs.width=window.innerWidth;cvs.height=window.innerHeight;}window.addEventListener('resize',resizeConfetti);resizeConfetti();
function launchMiniConfetti(){const colors=['#a855f7','#38bdf8','#34d399','#fbbf24','#fb7185','#f472b6','#818cf8'];for(let i=0;i<40;i++)particles.push({x:Math.random()*cvs.width,y:cvs.height*0.4,vx:(Math.random()-0.5)*6,vy:(Math.random()-1)*12,color:colors[Math.floor(Math.random()*colors.length)],size:Math.random()*8+4,rot:Math.random()*360,rotV:(Math.random()-0.5)*10,life:1,decay:0.015+Math.random()*0.01,shape:Math.random()>0.5?'rect':'circle'});if(!animId)animateParticles();}
function launchFireworks(){const colors=['#a855f7','#38bdf8','#34d399','#fbbf24','#fb7185','#f472b6','#fff','#818cf8','#4ade80'];for(let b=0;b<5;b++){const bx=cvs.width*(0.2+Math.random()*0.6),by=cvs.height*(0.1+Math.random()*0.4);setTimeout(()=>{for(let i=0;i<60;i++){const a=(Math.PI*2/60)*i+Math.random()*0.2,sp=4+Math.random()*8;particles.push({x:bx,y:by,vx:Math.cos(a)*sp,vy:Math.sin(a)*sp,color:colors[Math.floor(Math.random()*colors.length)],size:Math.random()*7+3,rot:0,rotV:(Math.random()-0.5)*12,life:1,decay:0.012+Math.random()*0.015,shape:Math.random()>0.6?'circle':'rect'});}if(!animId)animateParticles();},b*200);}}
function animateParticles(){ctx2.clearRect(0,0,cvs.width,cvs.height);particles=particles.filter(p=>p.life>0);particles.forEach(p=>{p.x+=p.vx;p.y+=p.vy;p.vy+=0.3;p.vx*=0.98;p.life-=p.decay;p.rot+=p.rotV;ctx2.save();ctx2.globalAlpha=Math.max(0,p.life);ctx2.translate(p.x,p.y);ctx2.rotate(p.rot*Math.PI/180);ctx2.fillStyle=p.color;if(p.shape==='circle'){ctx2.beginPath();ctx2.arc(0,0,p.size/2,0,Math.PI*2);ctx2.fill();}else{ctx2.fillRect(-p.size/2,-p.size/4,p.size,p.size/2);}ctx2.restore();});if(particles.length>0){animId=requestAnimationFrame(animateParticles);}else{animId=null;ctx2.clearRect(0,0,cvs.width,cvs.height);}}

/* ─── Next / Summary ─────────────────────────────── */
function nextQuestion(){if(STATE.totalAnswered>0&&STATE.totalAnswered%20===0)showSummary();else newQuestion();}
function showSummary(){const trophy=STATE.score>200?'🏆':STATE.score>100?'🥈':'🥉';document.getElementById('summary-trophy').textContent=trophy;document.getElementById('summary-title').textContent=`Super gemacht, ${STATE.name}!`;document.getElementById('stat-score').textContent=STATE.score;document.getElementById('stat-correct').textContent=STATE.totalCorrect;document.getElementById('stat-streak').textContent=STATE.bestStreak;const pct=Math.round((STATE.totalCorrect/STATE.totalAnswered)*100);const m=pct>=90?`🌟 ${STATE.name}, du bist ein Mathe-Zauberer!`:pct>=70?`💪 Tolle Leistung, ${STATE.name}!`:pct>=50?`🙂 Guter Anfang, ${STATE.name} — weiter üben!`:`📚 Weitermachen, ${STATE.name}!`;document.getElementById('summary-message').textContent=`${pct}% richtig — ${m}`;showScreen('screen-summary');launchFireworks();soundFireworks();}
function restartGame(){STATE.streak=0;STATE.questionsThisLevel=0;STATE.correctThisLevel=0;STATE.totalCorrect=0;STATE.totalAnswered=0;showScreen('screen-game');newQuestion();updateHUD();}

/* ─── Background ─────────────────────────────────── */
const bgCvs=document.getElementById('bg-canvas'),bgCtx=bgCvs.getContext('2d');let bgParticles=[];
function resizeBg(){bgCvs.width=window.innerWidth;bgCvs.height=window.innerHeight;}window.addEventListener('resize',resizeBg);resizeBg();
function initBg(){bgParticles=[];const count=Math.floor(bgCvs.width*bgCvs.height/8000);for(let i=0;i<count;i++)bgParticles.push({x:Math.random()*bgCvs.width,y:Math.random()*bgCvs.height,r:Math.random()*2+0.5,vx:(Math.random()-0.5)*0.12,vy:(Math.random()-0.5)*0.12,a:Math.random()*0.4+0.1});}
function animateBg(){bgCtx.clearRect(0,0,bgCvs.width,bgCvs.height);const t=STATE.theme;const col=t==='jungle'?'74,222,128':t==='space'?'168,85,247':'139,92,246';bgParticles.forEach(p=>{p.x+=p.vx;p.y+=p.vy;if(p.x<0)p.x=bgCvs.width;if(p.x>bgCvs.width)p.x=0;if(p.y<0)p.y=bgCvs.height;if(p.y>bgCvs.height)p.y=0;bgCtx.beginPath();bgCtx.arc(p.x,p.y,p.r,0,Math.PI*2);bgCtx.fillStyle=`rgba(${col},${t==='bright'?p.a*0.4:p.a})`;bgCtx.fill();});requestAnimationFrame(animateBg);}
initBg();animateBg();

/* ─── Screen Switch ──────────────────────────────── */
function showScreen(id){document.querySelectorAll('.screen').forEach(s=>s.classList.remove('active'));document.getElementById(id).classList.add('active');if(id==='screen-game')initBg();}

/* ─── Keyboard ───────────────────────────────────── */
document.addEventListener('keydown',e=>{if(document.querySelector('.screen.active')?.id!=='screen-game')return;if(STATE.answered){if(e.key==='Enter')nextQuestion();return;}if(e.key>='0'&&e.key<='9')numpadPress(e.key);else if(e.key==='Backspace')numpadDel();else if(e.key==='-')numpadPress('-');else if(e.key==='Enter')submitAnswer();});

/* ─── Service Worker ─────────────────────────────── */
if('serviceWorker' in navigator)window.addEventListener('load',()=>navigator.serviceWorker.register('sw.js'));

/* ─── Init ───────────────────────────────────────── */
loadProgress();
</script>
